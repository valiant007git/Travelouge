<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Not Found | Travelogue</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/global.css">
    
    <style>
        .error-page {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(to bottom, rgba(250,249,246,0.82), rgba(245,239,230,0.95)), url('https://images.unsplash.com/photo-1544735716-392fe2489ffa?auto=format&fit=crop&w=2000&q=80') center/cover no-repeat;
            color: var(--navy);
            padding: 20px;
        }
        .error-code {
            font-size: 8rem;
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            margin-bottom: 20px;
            line-height: 1;
            text-shadow: 0 18px 60px rgba(22, 50, 79, 0.16);
        }
        .error-msg {
            font-size: 1.5rem;
            margin-bottom: 30px;
            max-width: 600px;
        }
        .error-icon {
            font-size: 4rem;
            color: rgba(22, 50, 79, 0.22);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <section class="error-page">
        <i class="fa-solid fa-map-location-dot error-icon"></i>
        <h1 class="error-code">404</h1>
        <p class="error-msg">Oops! It seems you've ventured off the map. The page you're looking for doesn't exist or has been moved.</p>
        <a href="../index.html" class="btn" style="font-size: 1.1rem; padding: 15px 30px;"><i class="fa-solid fa-home"></i> Back to Home</a>
    </section>

</body>
</html>
